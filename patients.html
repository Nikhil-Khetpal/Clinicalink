            --neon-green: #00ff88;
            --neon-blue: #00d4ff;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-purple: #9b59b6;
            --accent-orange: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(155, 89, 182, 0.1) 0%, transparent 50%);
            animation: backgroundPulse 10s ease-in-out infinite;
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Navigation */
        .navbar {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0, 255, 136, 0.3);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar-brand {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Main Container */
        .main-container {
            margin-top: 6rem;
            padding: 2rem;
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        /* Filter Section */
        .filter-section {
            background: rgba(26, 26, 46, 0.95);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .filter-control {
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .filter-control:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            background: rgba(10, 10, 10, 0.9);
            outline: none;
            color: var(--text-primary);
        }

        /* Patients Grid */
        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        /* Patient Card */
        .patient-card {
            background: rgba(26, 26, 46, 0.95);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .patient-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            animation: rotate 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .patient-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.3);
        }

        /* Patient Profile Header */
        .patient-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .patient-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--neon-blue), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            margin-right: 1rem;
            position: relative;
        }

        .status-indicator {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid white;
        }

        .status-online {
            background: var(--neon-green);
            animation: pulse 2s infinite;
        }

        .status-offline {
            background: var(--accent-orange);
        }

        .status-away {
            background: var(--warning-color);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .patient-info h3 {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-blue);
            margin-bottom: 0.25rem;
        }

        .patient-age {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .patient-location {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Patient Details */
        .patient-details {
            margin-bottom: 1.5rem;
        }

        .detail-row {
            display: flex;
            align-items: center;
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
        }

        .detail-row i {
            width: 20px;
            color: var(--neon-blue);
            margin-right: 0.75rem;
        }

        /* Health Score */
        .health-score {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(10, 10, 10, 0.6);
            border-radius: 10px;
            border-left: 3px solid var(--neon-blue);
        }

        .score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .score-label {
            font-weight: 600;
            color: var(--neon-blue);
        }

        .score-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-green);
        }

        .score-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            border-radius: 5px;
            transition: width 1s ease;
        }

        /* Medical History */
        .medical-history {
            margin-bottom: 1.5rem;
        }

        .history-title {
            font-weight: 600;
            color: var(--neon-blue);
            margin-bottom: 0.75rem;
        }

        .condition-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            font-size: 0.8rem;
            color: var(--neon-blue);
            margin: 0.25rem;
        }

        /* Patient Stats */
        .patient-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-item {
            text-align: center;
            padding: 0.75rem;
            background: rgba(10, 10, 10, 0.6);
            border-radius: 10px;
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-blue);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Action Buttons */
        .patient-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-patient {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-consult {
            background: linear-gradient(45deg, var(--neon-blue), var(--accent-purple));
            color: white;
        }

        .btn-consult:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
            color: white;
        }

        .btn-profile {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
        }

        .btn-profile:hover {
            background: var(--neon-blue);
            color: white;
        }

        .btn-message {
            background: transparent;
            border: 2px solid var(--accent-purple);
            color: var(--accent-purple);
        }

        .btn-message:hover {
            background: var(--accent-purple);
            color: white;
        }

        /* Emergency Badge */
        .emergency-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-orange);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            animation: emergencyPulse 2s infinite;
        }

        @keyframes emergencyPulse {
            0%, 100% { 
                background: var(--accent-orange);
                transform: scale(1);
            }
            50% { 
                background: #ff4444;
                transform: scale(1.05);
            }
        }

        /* Back Button */
        .back-button {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-orange));
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(155, 89, 182, 0.5);
            text-decoration: none;
        }

        .back-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(155, 89, 182, 0.7);
            color: white;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .patients-grid {
                grid-template-columns: 1fr;
            }

            .patient-stats {
                grid-template-columns: 1fr;
            }

            .patient-actions {
                flex-direction: column;
            }

            .page-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

        // Render patients

            const grid = document.getElementById('patientsGrid');
            grid.innerHTML = '';

            patientsToRender.forEach(patient => {
                const card = createPatientCard(patient);
                grid.appendChild(card);
            });
        }

        // Create patient card

            const card = document.createElement('div');
            card.className = 'patient-card';
            
            const statusClass = patient.status === 'online' ? 'status-online' :

                        <div class="score-fill" style="width: ${patient.healthScore}%"></div>
                    </div>
                </div>

                <div class="medical-history">
                    <div class="history-title">Medical Conditions</div>
                    ${patient.conditions.map(condition => `
                        <span class="condition-tag">${condition}</span>
                    `).join('')}
                </div>

                <div class="patient-stats">
                    <div class="stat-item">
                        <div class="stat-number">${patient.totalVisits}</div>
                        <div class="stat-label">Total Visits</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${patient.membershipLevel}</div>
                        <div class="stat-label">Membership</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${calculateDaysSinceJoin(patient.joinDate)}</div>
                        <div class="stat-label">Days Active</div>
                    </div>
                </div>

                <div class="patient-actions">
                    <button class="btn-patient btn-consult" onclick="scheduleConsultation(${patient.id})">
                        <i class="fas fa-calendar-check me-2"></i>
                        Consult
                    </button>
                    <button class="btn-patient btn-profile" onclick="viewFullProfile(${patient.id})">
                        <i class="fas fa-file-medical me-2"></i>
                        Records
                    </button>
                    <button class="btn-patient btn-message" onclick="sendMessage(${patient.id})">
                        <i class="fas fa-comment me-2"></i>
                        Message
                    </button>
                </div>
            `;

            return card;
        }

        // Calculate days since join date
        function calculateDaysSinceJoin(joinDate) {
            const join = new Date(joinDate);
            const today = new Date();
            const diffTime = Math.abs(today - join);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        // Filter patients
        function filterPatients() {
            const searchTerm = document.getElementById('searchPatient').value.toLowerCase();
            const ageFilter = document.getElementById('filterAge').value;
            const healthFilter = document.getElementById('filterHealth').value;

            filteredPatients = patients.filter(patient => {
                const matchesSearch = patient.name.toLowerCase().includes(searchTerm) ||
                                    patient.location.toLowerCase().includes(searchTerm);
                
                let matchesAge = true;
                if (ageFilter) {
                    switch(ageFilter) {
                        case '0-18':
                            matchesAge = patient.age <= 18;
                            break;
                        case '19-35':
                            matchesAge = patient.age >= 19 && patient.age <= 35;
                            break;
                        case '36-50':
                            matchesAge = patient.age >= 36 && patient.age <= 50;
                            break;
                        case '51+':
                            matchesAge = patient.age >= 51;
                            break;
                    }
                }

                let matchesHealth = true;
                if (healthFilter) {
                    switch(healthFilter) {
                        case 'excellent':
                            matchesHealth = patient.healthScore >= 90;
                            break;
                        case 'good':
                            matchesHealth = patient.healthScore >= 70 && patient.healthScore < 90;
                            break;
                        case 'fair':
                            matchesHealth = patient.healthScore >= 50 && patient.healthScore < 70;
                            break;
                        case 'poor':
                            matchesHealth = patient.healthScore < 50;
                            break;
                    }
                }

                return matchesSearch && matchesAge && matchesHealth;
            });

            renderPatients(filteredPatients);
        }

        // Sort patients
        function sortPatients() {
            const sortBy = document.getElementById('sortBy').value;

            filteredPatients.sort((a, b) => {
                switch(sortBy) {
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'health':
                        return b.healthScore - a.healthScore;
                    case 'age':
                        return a.age - b.age;
                    case 'recent':
                        return new Date(b.lastVisit) - new Date(a.lastVisit);
                    default:
                        return 0;
                }
            });

            renderPatients(filteredPatients);
        }

        // Action functions
        function scheduleConsultation(patientId) {
            const patient = patients.find(p => p.id === patientId);
            if (patient) {
                // Store selected patient for consultation
                localStorage.setItem('selectedPatient', JSON.stringify(patient));
                window.location.href = 'book-appointment.html';
            }
        }

        function viewFullProfile(patientId) {
            const patient = patients.find(p => p.id === patientId);
            if (patient) {
                // Store patient data and redirect to profile page
                localStorage.setItem('patientProfile', JSON.stringify(patient));
                window.location.href = 'patient-profile.html';
            }
        }

        function sendMessage(patientId) {
            const patient = patients.find(p => p.id === patientId);
            if (patient) {
                // Store patient data and redirect to messaging
                localStorage.setItem('messagePatient', JSON.stringify(patient));
                window.location.href = 'messages.html';
            }
        }
    </script>
</body>
</html>
