<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinicalink</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
    
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-blue: #00d4ff;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-purple: #9b59b6;
            --accent-orange: #ff6b6b;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: default !important;
        }

        /* Remove cursor from all elements */
        * {
            cursor: default !important;
        }

        /* Only show cursor on interactive elements */
        button, a, input, textarea, select, .btn, .action-btn, .user-type-btn, .social-btn, .back-button {
            cursor: pointer !important;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(155, 89, 182, 0.1) 0%, transparent 50%);
            animation: backgroundPulse 10s ease-in-out infinite;
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--neon-green);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Login Container */
        .login-container {
            background: rgba(26, 26, 46, 0.95);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 255, 136, 0.1), transparent);
            animation: rotate 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Login Header */
        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .login-logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* User Type Selection */
        .user-type-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(10, 10, 10, 0.5);
            padding: 0.5rem;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .user-type-btn {
            flex: 1;
            padding: 1rem;
            border: 2px solid transparent;
            border-radius: 15px;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .user-type-btn.active {
            border-color: var(--neon-green);
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .user-type-btn:hover {
            border-color: rgba(0, 255, 136, 0.5);
            color: var(--text-primary);
        }

        .user-type-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        /* Form Styles */
        .form-floating-gaming {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .form-control-gaming {
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 15px;
            color: var(--text-primary);
            padding: 1rem 1rem 1rem 3rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            height: 60px;
        }

        .form-control-gaming:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            background: rgba(10, 10, 10, 0.9);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-green);
            z-index: 3;
            font-size: 1.2rem;
        }

        /* Remember Me & Forgot Password */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .form-check-gaming {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-check-gaming input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--neon-green);
        }

        .forgot-link {
            color: var(--neon-blue);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .forgot-link:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            border: none;
            border-radius: 15px;
            color: white;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.5);
        }

        /* Divider */
        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(0, 255, 136, 0.3);
        }

        .divider span {
            background: rgba(26, 26, 46, 0.95);
            padding: 0 1rem;
            color: var(--text-secondary);
            position: relative;
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 15px;
            background: rgba(10, 10, 10, 0.5);
            color: var(--text-primary);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .social-btn:hover {
            border-color: var(--neon-green);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }

        /* Register Link */
        .register-prompt {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
        }

        .register-link {
            color: var(--neon-green);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .register-link:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* Back Button */
        .back-button {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-orange));
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(155, 89, 182, 0.5);
        }

        .back-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(155, 89, 182, 0.7);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            z-index: 10;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top: 3px solid var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Success/Error Messages */
        .message-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .message-popup.show {
            transform: translateX(0);
        }

        .message-popup.success {
            background: linear-gradient(45deg, var(--success-color), #20c997);
        }

        .message-popup.error {
            background: linear-gradient(45deg, var(--danger-color), #c82333);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                margin: 1rem;
                padding: 2rem;
            }
            
            .login-logo {
                font-size: 2rem;
            }
            
            .user-type-selector {
                flex-direction: column;
            }
            
            .social-login {
                flex-direction: column;
            }
            
            .form-options {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Login Container -->
    <div class="login-container">
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>

        <!-- Login Header -->
        <div class="login-header">
            <div class="mb-3">
                <i class="fas fa-heartbeat fa-3x" style="color: var(--neon-green);"></i>
            </div>
            <h1 class="login-logo">CLINICALINK</h1>
            <p class="login-subtitle">Welcome Back to Your Healthcare Journey</p>
        </div>

        <!-- User Type Selection -->
        <div class="user-type-selector">
            <div class="user-type-btn active" onclick="selectUserType('patient', this)">
                <div class="user-type-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div>Patient</div>
                <small>Get Healthcare</small>
            </div>
            <div class="user-type-btn" onclick="selectUserType('doctor', this)">
                <div class="user-type-icon">
                    <i class="fas fa-user-md"></i>
                </div>
                <div>Doctor</div>
                <small>Provide Care</small>
            </div>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <input type="hidden" id="userType" value="patient">
            
            <div class="form-floating-gaming">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" class="form-control form-control-gaming" id="email" name="email" 
                       placeholder="Enter your email" required>
            </div>
            
            <div class="form-floating-gaming">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" class="form-control form-control-gaming" id="password" name="password" 
                       placeholder="Enter your password" required>
            </div>
            
            <div class="form-options">
                <div class="form-check-gaming">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
            </div>
            
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt me-2"></i>Login to Account
            </button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Social Login -->
        <div class="social-login">
            <button class="social-btn" onclick="socialLogin('google')">
                <i class="fab fa-google me-2"></i>Google
            </button>
            <button class="social-btn" onclick="socialLogin('facebook')">
                <i class="fab fa-facebook me-2"></i>Facebook
            </button>
            <button class="social-btn" onclick="socialLogin('twitter')">
                <i class="fab fa-twitter me-2"></i>Twitter
            </button>
        </div>

        <!-- Register Link -->
        <div class="register-prompt">
            Don't have an account? <a href="index.html#registration" class="register-link">Register here</a>
        </div>
    </div>

    <!-- Back Button -->
    <button class="back-button" onclick="goBack()" title="Go Back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <!-- Message Popup -->
    <div class="message-popup" id="messagePopup"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
    
    <script>
        let selectedUserType = 'patient';

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // User type selection
        function selectUserType(type, button) {
            selectedUserType = type;
            
            // Update button states
            document.querySelectorAll('.user-type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            button.classList.add('active');
            
            // Update hidden input
            document.getElementById('userType').value = type;
            
            // Update subtitle
            const subtitle = document.querySelector('.login-subtitle');
            if (type === 'patient') {
                subtitle.textContent = 'Welcome Back to Your Healthcare Journey';
            } else {
                subtitle.textContent = 'Welcome Back to Your Medical Practice';
            }
        }

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const userType = document.getElementById('userType').value;
            
            // Basic validation
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            // Show loading
            document.getElementById('loadingOverlay').classList.add('active');
            
            // Simulate API call (replace with actual API call)
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.remove('active');
                
                // Mock authentication (replace with real authentication)
                if (email && password.length >= 8) {
                    showMessage('Login successful! Redirecting...', 'success');
                    
                    // Store user session (replace with proper session management)
                    sessionStorage.setItem('userType', userType);
                    sessionStorage.setItem('userEmail', email);
                    
                    // Redirect based on user type
                    setTimeout(() => {
                        if (userType === 'doctor') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1500);
                } else {
                    showMessage('Invalid email or password', 'error');
                }
            }, 2000);
        });

        // Social login
        function socialLogin(provider) {
            showMessage(`Connecting to ${provider}...`, 'success');
            
            // Simulate social login (replace with actual OAuth implementation)
            setTimeout(() => {
                showMessage(`${provider} login would be implemented here with OAuth 2.0`, 'success');
            }, 1000);
        }

        // Forgot password
        function forgotPassword() {
            const email = prompt('Enter your email address for password reset:');
            if (email) {
                showMessage(`Password reset link sent to ${email}`, 'success');
            }
        }

        // Show message popup
        function showMessage(message, type) {
            const popup = document.getElementById('messagePopup');
            popup.textContent = message;
            popup.className = `message-popup ${type} show`;
            
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }

        // Go back function
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        // Initialize particles on page load
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            
            // Add hover effects to form inputs
            const inputs = document.querySelectorAll('.form-control-gaming');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.02)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });
            
            // Check if user is already logged in
            const userType = sessionStorage.getItem('userType');
            if (userType) {
                showMessage('You are already logged in', 'success');
                setTimeout(() => {
                    if (userType === 'doctor') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 2000);
            }
        });

        // Add keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                goBack();
            }
        });
    </script>
</body>
</html>
